<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#ff6eb6" />
  <title>Pink Metro Rush</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="game-shell" aria-label="Pink Metro Rush subway runner game">
    <section class="hud" aria-live="polite">
      <div><span class="label">Score</span><strong id="score">0</strong></div>
      <div><span class="label">Best</span><strong id="best">0</strong></div>
      <div><span class="label">Speed</span><strong id="speed">1x</strong></div>
    </section>

    <canvas id="game" width="720" height="960" aria-label="Game canvas" role="img"></canvas>

    <section id="overlay" class="overlay">
      <div class="card">
        <h1>Pink Metro Rush</h1>
        <p>Dodge trains, hop barriers, and collect hearts as a baggy-clothed runner in a neon pink subway.</p>
        <button id="startButton" type="button">Start Run</button>
        <p class="controls">Move: ← → / A D / swipe · Jump: ↑ / W / tap top · Slide: ↓ / S / tap bottom</p>
      </div>
    </section>
  </main>
  <script src="game.js" defer></script>
</body>
</html>
